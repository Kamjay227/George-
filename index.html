<!DOCTYPE html>
<html>
<head>
  <title>George Website</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Welcome to my website</h1>

  <div class="blue-square">  
   <script>
  const box = document.querySelector(".blue-square");

  let position = 0;

  setInterval(() => {
    position = position + 5;
    box.style.transform = "translateX(" + position + "px)";
  }, 100);
</script> 
    Click me
  </div>

  <script>
    document.querySelector(".blue-square").onclick = function () {
      alert("Hello George! Your website is working 🚀");
    }
  </script>

</body>
</html>
